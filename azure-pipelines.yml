trigger:
- main

pool:
  name: 'Default'

variables:
  dockerRegistryServiceConnection: 'ea119ec4-be0c-4fb7-81ff-fc61bdd0dbe6'
  imageRepository: 'dmytrooleksiienkolab6oleksiienko'
  containerRegistry: 'dmytroleksiienko.azurecr.io'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      displayName: "Build Image"
      inputs:
        command: build
        repository: $(imageRepository)
        # Використовуємо файл з папки initial, він зазвичай автономний
        dockerfile: 'initial/Dockerfile' 
        containerRegistry: $(dockerRegistryServiceConnection)
        arguments: '--platform linux/amd64'
        tags: |
          $(tag)

    - task: Docker@2
      displayName: "Push Image"
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)