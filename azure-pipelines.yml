trigger:
- main

pool:
  name: 'Default'  # Використовуємо твій локальний агент на Mac M3

variables:
  # Твої реальні назви з попередніх кроків
  dockerRegistryServiceConnection: 'dmytroleksiienko-acr'
  imageRepository: 'dmytrooleksiienkolab6oleksiienko'
  containerRegistry: 'dmytroleksiienko.azurecr.io'
  
  # Шлях до твого Dockerfile у папці complete
  dockerfilePath: '$(Build.SourcesDirectory)/complete/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build Job
    steps:
    - checkout: self

    # 1. Готуємо проєкт: компілюємо та розпаковуємо JAR
    # Це необхідно для твого Dockerfile, який шукає target/dependency
    - script: |
        cd complete
        chmod +x mvnw
        ./mvnw package -DskipTests
        mkdir -p target/dependency
        cd target/dependency
        jar -xf ../*.jar
      displayName: 'Maven Package and Unpack'

    # 2. Збірка образу з архітектурою linux/amd64 (важливо для Mac M3)
    - task: Docker@2
      displayName: "Build Image"
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        buildContext: '$(Build.SourcesDirectory)/complete'
        arguments: '--platform linux/amd64'
        tags: |
          $(tag)

    # 3. Завантаження образу в Azure Container Registry
    - task: Docker@2
      displayName: "Push Image to ACR"
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)