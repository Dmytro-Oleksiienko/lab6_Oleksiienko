trigger:
- main

pool:
  name: 'Default'

variables:
  dockerRegistryServiceConnection: 'dmytroleksiienko-acr'
  imageRepository: 'dmytrooleksiienkolab6oleksiienko'
  containerRegistry: 'dmytroleksiienko.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/complete/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build Job
    steps:
    - checkout: self


    - script: |
        cd complete
        chmod +x mvnw
        ./mvnw package -DskipTests
      displayName: 'Maven Package (Generate JAR)'


    - task: Docker@2
      displayName: "Build Docker Image"
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        arguments: '--platform linux/amd64'
        tags: |
          $(tag)


    - task: Docker@2
      displayName: "Push Image to ACR"
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)